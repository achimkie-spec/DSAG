# Datenquellen & Log-Spezifikationen (zentrale Lognormalisierung ggf noch sinnvoll!)
Logquellen:
  - log_id: src_abap_sal
    name: Security Audit Log (SAL)
    required_fields: [Event_ID,...]
    hints: die Aufzeichnung konkreter EVENT_IDs hängt von der Aktivierung und Konfiguration des ABAP SALs ab. Details siehe https://help.sap.com/docs/ABAP_PLATFORM_BW4HANA/280f016edb8049e998237fcbd80558e7/74406e80420e483fba6107bbc56718af.html. Im RISE Kontext ist zudem Hinweis 3250501 zu beachten

  - log_id: src_hana_audit_log
    Name: HANA DB Audit Log
    required_fields: [...]
    hints: die Aufzeichnung konkreter EVENT_IDs hängt von der Aktivierung und Konfiguration des HANA Audit Logs ab


# Detection Strategy
detections:
  # (Selbst)zuweisung kritischer Rollen/Profile
  - detection_id: 001
    log_id_ref: src_abap_sal #see log_source_definition.yaml
    selection:
      Message_ID IN *...* AND 
      Message_Text IN *...* AND
      Message_Text IN *...* # optional; identifiziert nur Selbstzuweisungen 
    release_dependencies: N/A

  # Berechtigungsanpassungen über Tabellenmanipulation mittels SE16N/S416N
  - detection_id: 002
    log_id_ref: src_abap_sal
    selection: 
      Message_ID IN *FUF* AND
      Message_Text IN (*AGR_*,*USR02*,*USR04*,*USR10*,*USR12*,*USRBF2*,*UST04*)
    release_dependencies: S416N/SE16N changes only available in SAL for Basisrelease >7.52 (see notes 3140539, 3146567 and 3141656); in previous releases, S*16N header tables (*_CD_KEY) can be used
    other_notes: weiterführende Informationen der exakten Änderungen sind über die Logsuche der S*16N Transaktionen verfügbar (S*16N>Absprung oder RKS*16N_DISPLAY_CHANGES)

  # Berechtigungsanpassungen über Tabellenmanipulation mittels Debugger
  - detection_id: 003
    log_id_ref: src_abap_sal
    selection: 
      Message_ID IN *CUL* AND
      Message_Text IN (*AGR_*,*USR02*,*USR04*,*USR10*,*USR12*,*USRBF2*,*UST04*)
    release_dependencies: N/A
    other_notes: N/A

  # Berechtigungsanpassungen über SQL Center in ABAP
  - detection_id: 004
    log_id_ref: src_abap_sal
    selection: 
      EVENT_ID IN (*FUM*,*FUP*) AND 
      Message_Text IN (*AGR_*,*USR02*,*USR04*,*USR10*,*USR12*,*USRBF2*,*UST04*)
    release_dependencies: changes via SQL center only available in SAL for Basisrelease >7.57 SP03 (see notes 3331129 and 3319853); in previous releases the data is made available for successful SQL statements from the DBACOCKPIT Audit Log table
    other_notes: sowohl erfolgreiche als auch fehlgeschlagene SQL statements werden protokolliert

  # Berechtigungsanpassungen über HANA SQL
  - detection_id: 005
    log_id_ref: src_hana_audit_log
    selection: 
      ...
    release_dependencies: N/A
    other_notes: N/A

  # (Selbst)zuweisung Referenzbenutzer
  - detection_id: 006
    log_id_ref: ...
    selection:
      ...
    release_dependencies: N/A
    other_notes: N/A


# Übliche Fehlalarme (False Positives)
common_false_positives:
  - berechtigte Notfallbenutzer oder "Firefighter" (Privileged User Management), welchen gemäß interner Betriebsstandards kritische Standardprofile zugewiesen werden dürfen
  - Entstörung von Fehlfunktionalitäten im Benutzer- oder Berechtigungskontext

